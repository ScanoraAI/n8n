name: Build and Deploy n8n

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Install dependencies (full monorepo, needed to build)
        run: pnpm install --frozen-lockfile

      - name: Build n8n and only its dependency graph
        run: pnpm turbo run build --filter=n8n...

      - name: Create flattened production-only bundle
        run: |
          pnpm --filter=n8n --prod deploy --legacy ./deploy-output
          cd ./deploy-output
          pnpm install --prod --no-frozen-lockfile --shamefully-hoist

      - name: Prepare Docker Configuration
        run: |
          cat << 'EOF' > ./deploy-output/docker-compose.yml
          services:
            n8n:
              image: node:24-alpine
              restart: always
              ports:
                - "5678:5678"
              environment:
                - NODE_ENV=production
                - NODE_OPTIONS=--max-old-space-size=512
                - N8N_PORT=5678
              working_dir: /app
              volumes:
                - ./n8n_data:/home/node/.n8n
                - .:/app
              command: node packages/cli/bin/n8n
          EOF

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ORACLE_SSH_KEY }}

      - name: Trust Oracle Cloud host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Sync build to Oracle Cloud
        run: |
          rsync -avzL --delete \
            -e "ssh" \
            ./deploy-output/ \
            ubuntu@${{ secrets.ORACLE_HOST }}:~/n8n-app/

      - name: Boot up n8n via Docker Compose on Oracle
        run: |
          ssh ubuntu@${{ secrets.ORACLE_HOST }} "cd ~/n8n-app && docker compose up -d"
