name: CI/CD Build and Deploy to Oracle

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Directory Structure
        run: mkdir -p ./deploy-output

      # Create a basic lightweight compose stack inside the runner to ship to Oracle
      - name: Prepare Docker Configuration
        run: |
          cat << 'EOF' > ./deploy-output/docker-compose.yml
          services:
            n8n:
              image: node:24-bookworm-slim
              restart: always
              environment:
                - NODE_ENV=production
                - NODE_OPTIONS=--max-old-space-size=512
                - N8N_PORT=5678
                - N8N_LISTEN_ADDRESS=0.0.0.0
                - WEBHOOK_URL=https://n8n.scanoraai.com/
                - N8N_ENCRYPTION_KEY_VOLUME=/home/node/.n8n/
              working_dir: /app
              volumes:
                - ./n8n_data:/home/node/.n8n
                - .:/app
              command: node bin/n8n

            caddy:
              image: caddy:2-alpine
              restart: always
              ports:
                - "80:80"
                - "443:443"
              volumes:
                - ./caddy_data:/data
                - ./caddy_config:/config
              environment:
                - DOMAIN=n8n.scanoraai.com
              command: caddy reverse-proxy --from https://n8n.scanoraai.com --to n8n:5678
          EOF

      - name: Copy files to Oracle Cloud Instance
        uses: appleboy/scp-action@master
        with:
          host: 161.118.177.83
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "./deploy-output/docker-compose.yml"
          target: "~/n8n-app"
          strip_components: 1

      - name: SSH into Oracle and Restart Containers
        uses: appleboy/ssh-action@master
        with:
          host: 161.118.177.83
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/n8n-app
            sudo chown -R 1000:1000 ~/n8n-app/n8n_data
            sudo chmod -R 777 ~/n8n-app/n8n_data
            docker compose down
            docker compose up -d --force-recreate
